{% extends 'base_admin.html' %}
{% block title %}Proveedores{% endblock %}
{% block content %}

<div class="mb-8 flex items-center justify-between" data-aos="fade-down">
    <div class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-cyan-500/20 rounded-2xl flex items-center justify-center text-cyan-400">
            <i class="fas fa-truck text-xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Proveedores</h2>
    </div>
    <a href="{{ url_for('proveedor.nuevo') }}" class="px-5 py-2.5 bg-cyan-500 hover:bg-cyan-600 text-white font-bold rounded-xl shadow-lg shadow-cyan-500/30 transform hover:-translate-y-1 transition flex items-center">
        <i class="fas fa-plus mr-2"></i> Nuevo Proveedor
    </a>
</div>

<div class="bg-adminCard rounded-3xl p-6 border border-slate-700 shadow-2xl relative overflow-hidden" data-aos="fade-up">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-500"></div>
    
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse data-table text-sm">
            <thead>
                <tr class="border-b border-slate-700">
                    <th class="py-4 px-4 font-bold text-slate-400 uppercase tracking-wider w-24">ID</th>
                    <th class="py-4 px-4 font-bold text-slate-400 uppercase tracking-wider">Nombre</th>
                    <th class="py-4 px-4 font-bold text-slate-400 uppercase tracking-wider">Contacto</th>
                    <th class="py-4 px-4 font-bold text-slate-400 uppercase tracking-wider text-right w-48">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-700/50">
                {% for p in proveedores %}
                <tr class="hover:bg-slate-800/50 transition-colors">
                    <td class="py-4 px-4 text-slate-300 font-medium">#{{ p.id }}</td>
                    <td class="py-4 px-4 text-white font-bold">{{ p.nombre }}</td>
                    <td class="py-4 px-4 text-slate-400">{{ p.contacto or '—' }}</td>
                    <td class="py-4 px-4 text-right">
                        <a href="{{ url_for('proveedor.editar', id=p.id) }}" class="inline-flex items-center justify-center w-8 h-8 rounded-xl bg-amber-500/10 text-amber-500 hover:bg-amber-500 hover:text-white transition-colors mr-2">
                            <i class="fas fa-edit"></i>
                        </a>
                        <button onclick="confirmAction('¿Eliminar proveedor?', 'Se eliminará el proveedor {{ p.nombre }}', () => window.location.href=`/admin/proveedores/eliminar/{{ p.id }}`)" class="inline-flex items-center justify-center w-8 h-8 rounded-xl bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-colors">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
