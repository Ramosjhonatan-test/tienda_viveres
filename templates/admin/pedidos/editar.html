{% extends 'base_admin.html' %}
{% block title %}Editar Estado de Pedido{% endblock %}
{% block content %}

<div class="mb-8 flex items-center justify-between" data-aos="fade-down">
    <div class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-indigo-500/20 rounded-2xl flex items-center justify-center text-indigo-400">
            <i class="fas fa-edit text-xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Actualizar Pedido #{{ pedido.id }}</h2>
    </div>
    <a href="{{ url_for('admin_pedido.lista') }}" class="px-4 py-2 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition font-bold flex items-center">
        <i class="fas fa-arrow-left mr-2"></i> Volver a pedidos
    </a>
</div>

<div class="bg-adminCard rounded-3xl p-8 border border-slate-700 shadow-2xl relative overflow-hidden" data-aos="fade-up">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>

    <form method="POST" class="max-w-xl">
        <div class="space-y-1 mb-8">
            <label for="estado" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Estado de la Orden</label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 transition-all bg-slate-800/50">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                    <i class="fas fa-tasks"></i>
                </div>
                <select name="estado" id="estado" required class="block w-full pl-11 pr-10 py-4 rounded-xl bg-transparent focus:outline-none text-white font-bold appearance-none text-lg">
                    <option value="pendiente" {% if pedido.estado == 'pendiente' %}selected{% endif %} class="bg-slate-800 text-amber-500">Pendiente</option>
                    <option value="confirmado" {% if pedido.estado == 'confirmado' %}selected{% endif %} class="bg-slate-800 text-blue-400">Confirmado</option>
                    <option value="enviado" {% if pedido.estado == 'enviado' %}selected{% endif %} class="bg-slate-800 text-cyan-400">Enviado</option>
                    <option value="entregado" {% if pedido.estado == 'entregado' %}selected{% endif %} class="bg-slate-800 text-emerald-400">Entregado</option>
                    <option value="cancelado" {% if pedido.estado == 'cancelado' %}selected{% endif %} class="bg-slate-800 text-rose-500">Cancelado</option>
                </select>
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                    <i class="fas fa-chevron-down text-sm"></i>
                </div>
            </div>
            <p class="text-xs text-slate-500 mt-2 ml-1">Al cambiar el estado se podrían disparar notificaciones al cliente.</p>
        </div>

        <div class="flex items-center space-x-4">
            <button type="submit" class="px-8 py-3 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transform hover:-translate-y-1 transition flex items-center">
                <i class="fas fa-save mr-2"></i> Actualizar Estado
            </button>
        </div>
    </form>
</div>

{% endblock %}
