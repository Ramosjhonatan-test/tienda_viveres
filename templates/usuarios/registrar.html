{% extends 'base.html' %}
{% block title %}Crear Cuenta{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    
    <!-- Bubble Decorations -->
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-emerald-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob pointer-events-none"></div>
    <div class="absolute top-[20%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[20%] w-96 h-96 bg-blue-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000 pointer-events-none"></div>

    <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl border border-white/50 relative z-10" data-aos="fade-up">
        
        <div class="text-center">
            <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-primary to-emerald-400 rounded-3xl flex items-center justify-center transform rotate-12 shadow-lg shadow-primary/30 mb-6">
                <i class="fas fa-user-plus text-white text-3xl -rotate-12"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800">Crear cuenta</h2>
            <p class="mt-2 text-sm text-slate-500">Registrate para comenzar a comprar en línea</p>
        </div>

        <form method="POST" action="{{ url_for('usuario.guardar') }}" class="mt-8 space-y-5">
            
            <div data-aos="fade-up" data-aos-delay="50">
                <label for="nombre" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Nombre completo</label>
                <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                        <i class="fas fa-id-card text-slate-400"></i>
                    </div>
                    <input id="nombre" name="nombre" type="text" required minlength="3" class="block w-full pl-12 pr-4 py-3.5 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="Juan Pérez">
                </div>
            </div>

            <div data-aos="fade-up" data-aos-delay="100">
                <label for="username" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Usuario</label>
                <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                        <i class="fas fa-user-circle text-slate-400"></i>
                    </div>
                    <input id="username" name="username" type="text" required minlength="4" class="block w-full pl-12 pr-4 py-3.5 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="juanp123">
                </div>
            </div>

            <div data-aos="fade-up" data-aos-delay="150">
                <label for="correo" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Correo electrónico</label>
                <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                        <i class="fas fa-envelope text-slate-400"></i>
                    </div>
                    <input id="correo" name="correo" type="email" required class="block w-full pl-12 pr-4 py-3.5 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="juan@ejemplo.com">
                </div>
            </div>

            <div data-aos="fade-up" data-aos-delay="200">
                <label for="celular" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Celular</label>
                <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                        <i class="fas fa-phone text-slate-400"></i>
                    </div>
                    <input id="celular" name="celular" type="tel" pattern="[0-9]{8,12}" class="block w-full pl-12 pr-4 py-3.5 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="Ej: 78965412">
                </div>
            </div>

            <div data-aos="fade-up" data-aos-delay="250" x-data="{ show: false }">
                <label for="password" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Contraseña</label>
                <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input id="password" name="password" :type="show ? 'text' : 'password'" required minlength="6" class="block w-full pl-12 pr-12 py-3.5 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="••••••••">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                        <button type="button" @click="show = !show" class="text-slate-400 hover:text-primary focus:outline-none transition-colors">
                            <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div data-aos="fade-up" data-aos-delay="300" class="pt-2">
                <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-slate-900 hover:bg-primary transition-all duration-300 shadow-xl shadow-slate-900/20 hover:shadow-primary/30 transform hover:-translate-y-1">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-user-plus text-slate-600 group-hover:text-emerald-200 transition-colors"></i>
                    </span>
                    Registrarme
                </button>
            </div>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 flex flex-col items-center" data-aos="fade-up" data-aos-delay="350">
            <p class="text-sm text-slate-500 mb-4">¿Ya tenés cuenta?</p>
            <a href="{{ url_for('usuario.login') }}" class="w-full flex justify-center items-center py-3 px-4 border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
                <i class="fas fa-sign-in-alt mt-0.5 mr-2 text-slate-400"></i> Iniciar sesión
            </a>
        </div>

    </div>
</div>
{% endblock %}
