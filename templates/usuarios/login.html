{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    
    <!-- Bubble Decorations -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob pointer-events-none"></div>
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-blue-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000 pointer-events-none"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-emerald-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000 pointer-events-none"></div>

    <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl border border-white/50 relative z-10" data-aos="fade-down">
        
        <div class="text-center">
            <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-primary to-emerald-300 rounded-3xl flex items-center justify-center transform rotate-12 shadow-lg shadow-primary/30 mb-6">
                <i class="fas fa-leaf text-white text-3xl -rotate-12"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800">¡Bienvenido!</h2>
            <p class="mt-2 text-sm text-slate-500">Ingresá tus credenciales para continuar</p>
        </div>

        <form method="POST" action="{{ url_for('usuario.login') }}" class="mt-8 space-y-6">
            <div class="space-y-4">
                <div data-aos="fade-up" data-aos-delay="100">
                    <label for="username" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Usuario</label>
                    <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                            <i class="fas fa-user text-slate-400"></i>
                        </div>
                        <input id="username" name="username" type="text" required class="block w-full pl-12 pr-4 py-4 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="tuusuario">
                    </div>
                </div>

                <div data-aos="fade-up" data-aos-delay="200" x-data="{ show: false }">
                    <label for="password" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Contraseña</label>
                    <div class="mt-1 relative rounded-2xl shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all bg-white">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center justify-center pointer-events-none">
                            <i class="fas fa-lock text-slate-400"></i>
                        </div>
                        <input id="password" name="password" :type="show ? 'text' : 'password'" required class="block w-full pl-12 pr-12 py-4 rounded-2xl bg-transparent focus:outline-none text-slate-900 font-medium placeholder-slate-400" placeholder="••••••••">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                            <button type="button" @click="show = !show" class="text-slate-400 hover:text-primary focus:outline-none transition-colors">
                                <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-end" data-aos="fade-up" data-aos-delay="300">
                <a href="#" class="text-sm font-bold text-primary hover:text-emerald-700 transition-colors">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <div data-aos="fade-up" data-aos-delay="400">
                <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-slate-900 hover:bg-primary transition-all duration-300 shadow-xl shadow-slate-900/20 hover:shadow-primary/30 transform hover:-translate-y-1">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt text-slate-600 group-hover:text-emerald-200 transition-colors"></i>
                    </span>
                    Ingresar
                </button>
            </div>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 flex flex-col items-center" data-aos="fade-up" data-aos-delay="500">
            <p class="text-sm text-slate-500 mb-4">¿No tenés cuenta?</p>
            <a href="{{ url_for('usuario.registrar') }}" class="w-full flex justify-center items-center py-3 px-4 border-2 border-slate-200 rounded-2xl text-sm font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all">
                <i class="fas fa-user-plus mr-2 text-slate-400"></i> Registrate aquí
            </a>
        </div>

    </div>
</div>
{% endblock %}
