{% extends 'base_admin.html' %}
{% block title %}Nueva Categoría{% endblock %}
{% block content %}

<div class="mb-8 flex items-center justify-between" data-aos="fade-down">
    <div class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-pink-500/20 rounded-2xl flex items-center justify-center text-pink-400">
            <i class="fas fa-folder-plus text-xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Agregar Categoría</h2>
    </div>
    <a href="{{ url_for('categoria.index') }}" class="px-4 py-2 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition font-bold flex items-center">
        <i class="fas fa-arrow-left mr-2"></i> Volver
    </a>
</div>

<div class="bg-adminCard rounded-3xl p-8 border border-slate-700 shadow-2xl relative overflow-hidden" data-aos="fade-up">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-pink-500 to-rose-500"></div>

    <form action="{{ url_for('categoria.guardar') }}" method="POST" class="max-w-2xl">
        
        <div class="space-y-1 mb-6">
            <label for="nombre" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Nombre de categoría <span class="text-rose-500">*</span></label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-pink-500 focus-within:ring-1 focus-within:ring-pink-500 transition-all bg-slate-800/50">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-tag text-slate-500"></i>
                </div>
                <input type="text" id="nombre" name="nombre" required class="block w-full pl-11 pr-4 py-3 rounded-xl bg-transparent focus:outline-none text-white placeholder-slate-500 font-medium" placeholder="Ej: Lácteos">
            </div>
        </div>

        <div class="flex space-x-4">
            <button type="submit" class="px-6 py-3 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl shadow-lg shadow-pink-500/30 transform hover:-translate-y-1 transition flex items-center">
                <i class="fas fa-check-circle mr-2"></i> Guardar categoría
            </button>
            <a href="{{ url_for('categoria.index') }}" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl transition flex items-center">
                Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
