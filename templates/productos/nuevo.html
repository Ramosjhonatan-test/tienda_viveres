{% extends 'base_admin.html' %}
{% block title %}Nuevo Producto{% endblock %}
{% block content %}

<div class="mb-8 flex items-center justify-between" data-aos="fade-down">
    <div class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-emerald-400">
            <i class="fas fa-box-open text-xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Registrar Producto</h2>
    </div>
    <a href="{{ url_for('producto.index') }}" class="px-4 py-2 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition font-bold flex items-center">
        <i class="fas fa-arrow-left mr-2"></i> Volver
    </a>
</div>

<div class="bg-adminCard rounded-3xl p-8 border border-slate-700 shadow-2xl relative overflow-hidden" data-aos="fade-up">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-teal-500"></div>

    <form action="{{ url_for('producto.guardar') }}" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6" enctype="multipart/form-data">

        <!-- Nombre -->
        <div class="space-y-1">
            <label for="nombre" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Nombre del producto <span class="text-rose-500">*</span></label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50">
                <input type="text" id="nombre" name="nombre" required class="block w-full px-4 py-3 rounded-xl bg-transparent focus:outline-none text-white placeholder-slate-500 font-medium" placeholder="Ej: Manzanas">
            </div>
        </div>

        <!-- Precio -->
        <div class="space-y-1">
            <label for="precio" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Precio (Bs) <span class="text-rose-500">*</span></label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50 flex">
                <span class="inline-flex items-center px-4 rounded-l-xl border-r border-slate-600 bg-slate-700/50 text-slate-400">
                    <i class="fas fa-dollar-sign"></i>
                </span>
                <input type="number" step="0.01" min="0" id="precio" name="precio" required class="block w-full px-4 py-3 rounded-r-xl bg-transparent focus:outline-none text-white placeholder-slate-500 font-medium" placeholder="0.00">
            </div>
        </div>

        <!-- Descripción -->
        <div class="md:col-span-2 space-y-1">
            <label for="descripcion" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Descripción</label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50">
                <textarea id="descripcion" name="descripcion" rows="3" class="block w-full px-4 py-3 rounded-xl bg-transparent focus:outline-none text-white placeholder-slate-500 font-medium resize-none" placeholder="Descripción detallada del producto..."></textarea>
            </div>
        </div>

        <!-- Stock -->
        <div class="space-y-1">
            <label for="stock" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Stock Inicial <span class="text-rose-500">*</span></label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50 flex">
                <span class="inline-flex items-center px-4 rounded-l-xl border-r border-slate-600 bg-slate-700/50 text-slate-400">
                    <i class="fas fa-boxes"></i>
                </span>
                <input type="number" min="0" id="stock" name="stock" required class="block w-full px-4 py-3 rounded-r-xl bg-transparent focus:outline-none text-white placeholder-slate-500 font-medium" placeholder="0">
            </div>
        </div>

        <!-- Categoría -->
        <div class="space-y-1">
            <label for="categoria_id" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Categoría <span class="text-rose-500">*</span></label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50 flex">
                <span class="inline-flex items-center px-4 rounded-l-xl border-r border-slate-600 bg-slate-700/50 text-slate-400">
                    <i class="fas fa-tags"></i>
                </span>
                <select name="categoria_id" id="categoria_id" required class="block w-full px-4 py-3 rounded-r-xl bg-transparent focus:outline-none text-white font-medium appearance-none">
                    <option value="" disabled selected class="bg-slate-800">Seleccione categoría</option>
                    {% for c in categorias %}
                    <option value="{{ c.id }}" class="bg-slate-800">{{ c.nombre }}</option>
                    {% endfor %}
                </select>
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                    <i class="fas fa-chevron-down text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Proveedor -->
        <div class="space-y-1">
            <label for="proveedor_id" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Proveedor <span class="text-rose-500">*</span></label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50 flex">
                <span class="inline-flex items-center px-4 rounded-l-xl border-r border-slate-600 bg-slate-700/50 text-slate-400">
                    <i class="fas fa-truck"></i>
                </span>
                <select name="proveedor_id" id="proveedor_id" required class="block w-full px-4 py-3 rounded-r-xl bg-transparent focus:outline-none text-white font-medium appearance-none">
                    <option value="" disabled selected class="bg-slate-800">Seleccione proveedor</option>
                    {% for p in proveedores %}
                    <option value="{{ p.id }}" class="bg-slate-800">{{ p.nombre }}</option>
                    {% endfor %}
                </select>
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                    <i class="fas fa-chevron-down text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Imagen URL -->
        <div class="space-y-1" x-data="{ imgUrl: '' }">
            <label for="imagen_url" class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Imagen URL</label>
            <div class="relative rounded-xl shadow-sm border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all bg-slate-800/50 flex mb-2">
                <span class="inline-flex items-center px-4 rounded-l-xl border-r border-slate-600 bg-slate-700/50 text-slate-400">
                    <i class="fas fa-link"></i>
                </span>
                <input type="url" id="imagen_url" name="imagen" x-model="imgUrl" class="block w-full px-4 py-3 rounded-r-xl bg-transparent focus:outline-none text-white placeholder-slate-500 font-medium" placeholder="https://ejemplo.com/imagen.jpg">
            </div>
            
            <div x-show="imgUrl" class="mt-2 text-center" style="display: none;">
                <img :src="imgUrl" class="h-32 object-contain rounded-xl border border-slate-600 mx-auto bg-slate-900" @error="$el.style.display='none'">
            </div>
        </div>

        <!-- Actions -->
        <div class="md:col-span-2 pt-4 flex justify-end">
            <button type="submit" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/30 transform hover:-translate-y-1 transition flex items-center">
                <i class="fas fa-save mr-2"></i> Guardar Producto
            </button>
        </div>
    </form>
</div>

{% endblock %}
